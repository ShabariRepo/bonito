version: "1"
name: enterprise-ai-ops
description: "Enterprise AI operations — multi-cloud, failover, governed agents"

providers:
  - name: aws-bedrock
    type: aws
  - name: azure-openai
    type: azure
  - name: gcp-vertex
    type: gcp
  - name: anthropic-direct
    type: anthropic

routing:
  - name: production-failover
    strategy: failover
    targets:
      - provider: aws-bedrock
        model: us.anthropic.claude-sonnet-4-20250514-v1:0
        priority: 1
      - provider: azure-openai
        model: gpt-4o
        priority: 2
      - provider: gcp-vertex
        model: gemini-2.0-flash
        priority: 3

  - name: internal-cost-optimized
    strategy: cost
    targets:
      - provider: gcp-vertex
        model: gemini-2.0-flash
        priority: 1
      - provider: aws-bedrock
        model: us.amazon.nova-lite-v1:0
        priority: 2

agents:
  - name: Tier 1 Support
    model_id: us.anthropic.claude-sonnet-4-20250514-v1:0
    system_prompt: |
      Enterprise support agent. Investigate alerts, follow internal playbooks,
      and remediate issues. Escalate to Tier 2 if unresolved after 2 attempts.
    model_config:
      temperature: 0.2
      max_tokens: 2048
    tools:
      mode: allowlist
      allowed:
        - kb_search
        - http
      http_allowlist:
        - "https://internal-api.company.com/*"

  - name: Knowledge Assistant
    model_id: gpt-4o
    system_prompt: |
      Internal knowledge assistant. Answer questions about company policies,
      processes, and documentation using the knowledge base.
    model_config:
      temperature: 0.3
      max_tokens: 1024
    tools:
      mode: allowlist
      allowed:
        - kb_search

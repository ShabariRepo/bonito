version: "1"
name: support-bot
description: "Customer support agent with governed tools and knowledge base"

gateway:
  providers:
    - name: openai
      api_key: ${OPENAI_API_KEY}

agents:
  customer-support:
    display_name: "Customer Support"
    model_id: gpt-4o
    system_prompt: |
      You are a helpful customer support agent. Answer questions accurately
      using the knowledge base. If you don't know the answer, escalate to
      a human. Always be polite and concise.
    model_config:
      temperature: 0.3
      max_tokens: 1024
    tools:
      mode: allowlist
      allowed:
        - kb_search
